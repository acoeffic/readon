
[functions.send-push-notification]
enabled = true
verify_jwt = true
import_map = "./functions/send-push-notification/deno.json"
entrypoint = "./functions/send-push-notification/index.ts"

[functions.send-streak-reminders]
enabled = true
verify_jwt = false
entrypoint = "./functions/send-streak-reminders/index.ts"

[functions.send-wrapped-notification]
enabled = true
verify_jwt = true
import_map = "./functions/send-wrapped-notification/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-wrapped-notification/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-wrapped-notification/*.html" ]
